

<div class="min-h-screen flex items-center justify-center">
<app-cyber-background></app-cyber-background>

  <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">

    <h2 class="text-2xl font-bold text-center mb-6">
      Employee Registration
    </h2>

    <form (ngSubmit)="register()">
         <div class="mb-4">
        <label class="block text-gray-700 mb-2">
          Admin Email
        </label>

        <input
          type="email"
          [(ngModel)]="adminemail"
          name="adminemail"
          class="w-full border rounded px-3 py-2 focus:outline-none focus:ring focus:border-blue-300"
        />
      </div>
      

      <div class="mb-6">
        <label class="block text-gray-700 mb-2">
          Admin Password
        </label>

        <input
          type="password"
          [(ngModel)]="adminpassword"
          name="adminpassword"
          class="w-full border rounded px-3 py-2 focus:outline-none focus:ring focus:border-blue-300"
        />
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 mb-2">
          Full Name
        </label>

        <input
          type="text"
          [(ngModel)]="fullname"
          name="fullname"
          class="w-full border rounded px-3 py-2 focus:outline-none focus:ring focus:border-blue-300"
        />
      </div>
      <div class="mb-4">
        <label class="block text-gray-700 mb-2">
         username
        </label>

        <input
          type="text"
          [(ngModel)]="username"
          name="username"
          class="w-full border rounded px-3 py-2 focus:outline-none focus:ring focus:border-blue-300"
        />
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 mb-2">
          Email
        </label>

        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          class="w-full border rounded px-3 py-2 focus:outline-none focus:ring focus:border-blue-300"
        />
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 mb-2">
          Role
        </label>

        <select
          [(ngModel)]="role"
          name="role"
          class="w-full border rounded px-3 py-2 bg-white focus:outline-none focus:ring focus:border-blue-300"
        >
          <option value="" disabled selected>Select a role...</option>
          <option value="Chief Information Security Officer">Chief Information Security Officer</option>
          <option value="Security Architect">Security Architect</option>
          <option value="Security Engineer">Security Engineer</option>
          <option value="SOC Analyst">SOC Analyst</option>
          <option value="Security Auditor">Security Auditor</option>
        </select>
      </div>

      <div class="mb-6">
        <label class="block text-gray-700 mb-2">
          Assigned Password
        </label>

        <input
          type="password"
          [(ngModel)]="assignedpassword"
          name="assignedpassword"
          class="w-full border rounded px-3 py-2 focus:outline-none focus:ring focus:border-blue-300"
        />
      </div>

      <button
        class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700"
      >
        Register
      </button>

    </form>

  </div>

</div>
